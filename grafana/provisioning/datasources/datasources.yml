apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    jsonData:
      derivedFields:
        - datasourceUid: Jaeger
          matcherRegex: '"trace_id"\s*:\s*"([a-f0-9]+)"'
          name: TraceID
          url: '$${__value.raw}'
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
