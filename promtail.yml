server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: java-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: java-logs
          __path__: /var/log/app/*.log
    pipeline_stages:
      - json:
          expressions:
            trace_id: trace_id
            span_id: span_id
            level: level
            message: message
            logger: logger
            timestamp: timestamp
      - labels:
          trace_id:
          span_id:
          level: