version: "3.8"

networks:
  observability:
    driver: bridge

volumes:
  app-logs:
  postgres_data:
  kafka_data:

services:
  jaeger:
    image: jaegertracing/all-in-one:1.50
    ports:
      - "16686:16686"
      - "4317:4317"
      - "14250:14250"
    networks:
      - observability

  prometheus:
    image: prom/prometheus:v2.51.1
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--enable-feature=exemplar-storage'
    networks:
      - observability

  loki:
    image: grafana/loki:2.9.1
    ports:
      - "3100:3100"
    volumes:
      - ./loki.yml:/etc/loki/local-config.yaml
    networks:
      - observability

  grafana:
    image: grafana/grafana:10.2.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
      - loki
      - jaeger
    networks:
      - observability

  mcp-grafana:
    image: grafana/mcp-grafana:latest
    ports:
      - "8000:8000"
    environment:
      GRAFANA_URL: http://grafana:3000
      GRAFANA_USERNAME: admin
      GRAFANA_PASSWORD: admin
    command:
      - '--disable-write'
      - '--address'
      - ':8000'
    depends_on:
      - grafana
    networks:
      - observability

  jaeger-mcp-service:
    build:
      context: .
      dockerfile: jaeger-mcp-service/Dockerfile
    ports:
      - "8083:8080"
    environment:
      JAEGER_BASE_URL: http://jaeger:16686
    depends_on:
      - jaeger
    networks:
      - observability

  triage-agent:
    build:
      context: .
      dockerfile: triage-agent/Dockerfile
    ports:
      - "8084:8080"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/appdb
      SPRING_DATASOURCE_USERNAME: appuser
      SPRING_DATASOURCE_PASSWORD: secret
    depends_on:
      - mcp-grafana
      - jaeger-mcp-service
      - kafka
      - postgres
    networks:
      - observability

  promtail:
    image: grafana/promtail:2.9.1
    volumes:
      - ./promtail.yml:/etc/promtail/config.yml
      - app-logs:/var/log/app
    depends_on:
      - loki
    networks:
      - observability
    command: -config.file=/etc/promtail/config.yml

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - observability

  kafka:
    image: confluentinc/cp-kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: BROKER://kafka:29092,CONTROLLER://kafka:9093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: BROKER://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: BROKER:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: BROKER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    networks:
      - observability

  caller-service:
    build:
      context: .
      dockerfile: caller-service/Dockerfile
    ports:
      - "8081:8080"
    volumes:
      - app-logs:/var/log/app
    environment:
      OTEL_SERVICE_NAME: caller-service
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      JAVA_TOOL_OPTIONS: -javaagent:/opentelemetry-javaagent.jar
      POSTGRES_URL: jdbc:postgresql://postgres:5432/appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: secret
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      - jaeger
      - postgres
      - kafka
    networks:
      - observability

  downstream-service:
    build:
      context: .
      dockerfile: downstream-service/Dockerfile
    ports:
      - "8082:8080"
    volumes:
      - app-logs:/var/log/app
    environment:
      OTEL_SERVICE_NAME: downstream-service
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      JAVA_TOOL_OPTIONS: -javaagent:/opentelemetry-javaagent.jar
      POSTGRES_URL: jdbc:postgresql://postgres:5432/appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: secret
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      - jaeger
      - postgres
      - kafka
    networks:
      - observability

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka
    networks:
      - observability